<style>
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-subtle-pulse { animation: subtle-pulse 3s ease-in-out infinite; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1s; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col overflow-hidden">
<!-- Loading Screen Canvas -->
<main class="relative w-full h-screen flex flex-col items-center justify-between py-12 px-container-margin overflow-hidden">
<!-- Background Atmospheric Element -->
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none"></div>
<!-- Spacer for top balance -->
<div class="w-full h-14"></div>
<!-- Center Identity Section -->
<div class="flex flex-col items-center space-y-stack-lg z-10">
<!-- Brand Logo -->
<div class="relative w-40 h-40 md:w-56 md:h-56 animate-subtle-pulse">
<img alt="TeatroFácil Logo" class="w-full h-full object-contain filter drop-shadow-xl" src="https://lh3.googleusercontent.com/aida/ADBb0uimzMKMNw_FNfUfuZdH8XOhnMpPwoBGgoS_H75X8qwc5Ef37qtp3Bu8eW4CUpgNIC8F-UPmrc8DGDUpC7ICvN_1jEHNMCBe9ohNpPj7yl7fs2zqV9JQ2zsEnB06qXScEwcx7sNmnLQn3qtcIlW3keFbL9PjXAPeKzsHGi0WNFTO6YpuGKC6V8-MgkA7mO8DQ2RlpWK0gaeKgFR0cvEHESt9cKB6QDOlAA_KhYFSk3kgdxQ1DqDAXpH7DA">
</div>
<!-- Loading Text -->
<div class="flex flex-col items-center space-y-base">
<h1 class="font-headline-md text-headline-md text-primary animate-pulse text-center">
                    Preparando o espetáculo...
                </h1>
<!-- Loading Progress Bar (Minimalist) -->
<div class="w-32 h-[2px] bg-outline-variant rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-500 ease-out" id="progress-bar" style="width: 10%;"></div>
</div>
</div>
</div>
<!-- Footer Theater Elements -->
<div class="flex flex-col items-center space-y-6 w-full z-10">
<div class="flex items-center justify-center space-x-stack-lg">
<div class="flex flex-col items-center animate-float">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="theater_comedy">theater_comedy</span>
</div>
<div class="flex flex-col items-center animate-float delay-1">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="confirmation_number">confirmation_number</span>
</div>
<div class="flex flex-col items-center animate-float delay-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="curtains">curtains</span>
</div>
</div>
<p class="font-label-md text-label-md text-on-surface-variant tracking-widest uppercase">
                TeatroFácil
            </p>
</div>
<!-- Decorative Stage Lighting (Subtle Glows) -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary/10 blur-[100px] rounded-full"></div>
</main>
<script>
        // Micro-interaction: Progress bar simulation
        const progressBar = document.getElementById('progress-bar');
        let width = 10;
        const interval = setInterval(() => {
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                // Simulate transition after loading
                setTimeout(() => {
                    document.body.style.opacity = '0.5';
                    document.body.style.transition = 'opacity 1s ease';
                }, 500);
            } else {
                // Random increments to feel "organic"
                width += Math.floor(Math.random() * 15) + 1;
                if (width > 95 && width < 100) width = 95; // Pause slightly at the end
                progressBar.style.width = width + '%';
            }
        }, 600);

        // Micro-interaction: Icon tilt based on orientation (if supported)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const icons = document.querySelectorAll('.animate-float');
                const rotate = event.gamma / 5; // Tilt range
                icons.forEach(icon => {
                    icon.style.transform = `rotate(${rotate}deg)`;
                });
            });
        }
    </script>
