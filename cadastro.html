<style>
        body {
            background-color: #f9f9fc;
            color: #1a1c1e;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-playbill-gradient {
            background: linear-gradient(180deg, rgba(0,27,53,0.05) 0%, rgba(249,249,252,1) 100%);
        }
        input:focus {
            outline: none;
            border-color: #b5914c !important; /* Antique Gold from Tertiary Container label */
            box-shadow: 0 0 0 1px #b5914c;
        }
        .social-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .social-btn:active {
            transform: scale(0.98);
            background-color: #f3f3f6;
        }
    </style>

<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Top Navigation Bar (Mobile Logic - Suppressed per Shared Component rules for transactional screen, but following "Login Style" request for layout) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md px-margin-mobile py-unit flex items-center justify-between border-b border-outline-variant/30">
<button aria-label="Go back" class="p-unit rounded-full hover:bg-surface-container-high transition-colors text-primary">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<span class="font-headline-md text-headline-md text-primary tracking-tight">TeatroFácil</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 pt-24 pb-12 px-margin-mobile max-w-md mx-auto w-full">
<!-- Hero Section -->
<section class="mb-10 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Junte-se à Plateia</h1>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80">Experimente as melhores performances do mundo no seu lugar na primeira fila.</p>
</section>
<!-- Social Sign Up -->
<section class="grid grid-cols-2 gap-4 mb-8">
<button class="social-btn flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-lg bg-surface font-label-md text-label-md text-on-surface">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZVCAjmp__NZiM5-e2TNYO8GsdkxTlk59sj-qPGZkqty7y86mSfLjR4eUU4b0D9tksBEezkGm3uLAjp_UPVJQy6Pzs8HutjOml69wenX10CR0MXbim2pWugSlX1y0iToKJ1X5wnC1gvErJKYFo25vShbjhARQBdCZBlIjJbaylMbqrUpgOB_aCxfhqTkRQcyUlNgf_uMKNXybMFB-FjxS4wAIts4IE5M4p71VrKhIVveTCnzmuCBTOxsynWdRvNnoaXjiGilU-IzE">
<span class="">Google</span>
</button>
<button class="social-btn flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-lg bg-surface font-label-md text-label-md text-on-surface">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="">Apple</span>
</button>
</section>
<div class="relative flex items-center justify-center mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<span class="relative px-4 bg-surface text-on-surface-variant font-label-sm text-label-sm uppercase tracking-widest">OU E-MAIL</span>
</div>
<!-- Sign Up Form -->
<form class="space-y-6" id="signupForm">
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="fullName">Nome Completo</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg transition-all font-body-md placeholder:text-outline" id="fullName" name="fullName" placeholder="Nome completo" required="" type="text">
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="email">E-mail</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg transition-all font-body-md placeholder:text-outline" id="email" name="email" placeholder="seu@email.com" required="" type="email">
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="password">Senha</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg transition-all font-body-md placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="confirmPassword">Confirmar Senha</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg transition-all font-body-md placeholder:text-outline" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant" onclick="togglePassword('confirmPassword')" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full py-4 bg-primary-container text-white font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.99] transition-all uppercase tracking-widest" type="submit">CRIAR CONTA</button>
</div>
</form>
<!-- Terms -->
<p class="mt-8 text-center text-on-surface-variant font-label-sm text-label-sm px-4">Ao se cadastrar, você concorda com nossos <a class="text-primary-container underline underline-offset-4" href="#">Termos de Serviço</a> e <a class="text-primary-container underline underline-offset-4" href="#">Política de Privacidade</a>.</p>
<!-- Login Redirect -->
<footer class="mt-12 text-center pb-8">
<p class="font-body-md text-on-surface-variant">Já tem uma conta? <a class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4 transition-all" href="#">Entre</a></p>
</footer>
</main>
<!-- Visual Embellishment: Low-opacity dramatic lighting background -->
<div class="fixed bottom-0 left-0 w-full h-1/3 pointer-events-none z-[-1] opacity-40 bg-playbill-gradient"></div>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Form Submission micro-interaction
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block animate-spin material-symbols-outlined mr-2">progress_activity</span> Processing...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined mr-2">check_circle</span> Welcome Aboard`;
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                btn.style.color = '#e9c176';
            }, 1500);
        });
    </script>
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-[-2]">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[20%] -right-[20%] w-[50%] h-[50%] bg-tertiary-fixed-dim/10 rounded-full blur-[150px]"></div>
</div>
