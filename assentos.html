<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>TeatroFácil - Seleção de Assentos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

          "error-container": "#ffdad6",
          "surface-container": "#f0eee9",
          "on-tertiary-fixed": "#1b1c1c",
          "on-error": "#ffffff",
          "secondary-container": "#ffdea5",
          "surface-tint": "#003057",
          "surface-container-highest": "#e4e2dd",
          "on-primary-fixed": "#001c37",
          "on-error-container": "#93000a",
          "error": "#ba1a1a",
          "on-surface-variant": "#43474e",
          "secondary-fixed": "#ffdea5",
          "on-background": "#1a1c1e",
          "primary-fixed-dim": "#a6c9f8",
          "on-surface": "#1a1c1e",
          "surface-variant": "#e2e2e5",
          "on-secondary": "#ffffff",
          "secondary-fixed-dim": "#e9c176",
          "surface-dim": "#dadadc",
          "on-tertiary-container": "#b5914c",
          "tertiary": "#241800",
          "inverse-primary": "#a6c9f8",
          "surface-container-low": "#f3f3f6",
          "background": "#f9f9fc",
          "primary-container": "#003057",
          "surface": "#f9f9fc",
          "on-primary-container": "#7699c5",
          "tertiary-container": "#3f2b00",
          "primary-fixed": "#d2e4ff",
          "on-secondary-container": "#64635b",
          "on-tertiary-fixed-variant": "#5d4201",
          "on-secondary-fixed-variant": "#484740",
          "outline": "#73777f",
          "surface-container-high": "#e8e8ea",
          "tertiary-fixed": "#ffdea5",
          "on-tertiary": "#ffffff",
          "secondary": "#605e57",
          "on-primary": "#ffffff",
          "outline-variant": "#c3c6cf",
          "on-secondary-fixed": "#1c1c16",
          "tertiary-fixed-dim": "#e9c176",
          "primary": "#003057",
          "surface-container-lowest": "#ffffff",
          "on-primary-fixed-variant": "#234871"
        },
        borderRadius: {
          "DEFAULT": "0.125rem",

        spacing: {

          "stack-lg": "32px",
          "section-gap": "48px",
          "stack-sm": "4px",
          "base": "8px",
          "container-margin": "20px",
          "stack-md": "16px"
        },
        fontFamily: {
          "headline-sm": ["Playfair Display"],
          "display-lg": ["Playfair Display"],
          "label-md": ["Inter"],
          "body-sm": ["Inter"],
          "headline-md": ["Playfair Display"],
          "display-lg-mobile": ["Playfair Display"],
          "body-lg": ["Inter"],

          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
          "label-lg": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "600" }],
          "label-sm": ["10px", { lineHeight: "14px", letterSpacing: "0.05em", fontWeight: "500" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
  }
  .stage-curve {
    border-radius: 50% / 100% 100% 0 0;
  }
  .perforation {
    background-image: radial-gradient(circle, #c3c6cf 2px, transparent 2px);
    background-size: 12px 12px;
    background-position: center;
  }
  body {
    min-height: max(884px, 100dvh);
  }

  /* Assento base */
  .seat {
    border-radius: 4px 4px 2px 2px;
    border: none;
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.15s ease;
    position: relative;
    outline: none;
  }
  .seat:focus-visible {
    box-shadow: 0 0 0 2px #a6c9f8;
  }
  .seat:active:not(:disabled) {
    transform: scale(0.88);
  }

  /* Plateia livre */
  .seat-plateia {
    width: 30px;
    height: 26px;
    background-color: #241800;
  }
  .seat-plateia:hover:not(:disabled) {
    opacity: 0.7;
  }

  /* Balcão livre */
  .seat-balcao {
    width: 24px;
    height: 20px;
    background-color: #e2e2e5;
    border: 1px solid #c3c6cf;
  }
  .seat-balcao:hover:not(:disabled) {
    background-color: #c3c6cf;
  }

  /* Selecionado */
  .seat-selected {
    background-color: #003057 !important;
    border-color: #003057 !important;
  }
  .seat-selected::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 13px;
    font-weight: 600;
  }
  .seat-plateia.seat-selected::after { font-size: 14px; }
  .seat-balcao.seat-selected::after  { font-size: 11px; }

  /* Ocupado */
  .seat-occupied {
    background-color: #888 !important;
    border-color: #888 !important;
    opacity: 0.35;
    cursor: not-allowed;
  }
  .seat-occupied::after { content: none; }

  /* Linha de assentos */
  .seat-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .row-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #73777f;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .aisle { width: 10px; flex-shrink: 0; }
</style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">

<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center px-container-margin h-14 w-full z-50 sticky top-0">
  <button onclick="history.back()" class="flex items-center gap-1 transition-all duration-200 active:scale-95 hover:opacity-70 cursor-pointer bg-transparent border-none p-1" aria-label="Voltar">
    <span class="material-symbols-outlined text-primary">arrow_back</span>
  </button>
  <div class="flex flex-col items-center">
    <h1 class="font-headline-sm text-headline-sm text-primary leading-tight">O Fantasma da Ópera</h1>
    <p class="font-label-sm text-label-sm text-on-surface-variant">24 Out | 20:00 • Teatro Municipal</p>
  </div>
  <button class="flex items-center transition-all duration-200 active:scale-95 hover:opacity-70 bg-transparent border-none p-1" aria-label="Informações">
    <span class="material-symbols-outlined text-primary">info</span>
  </button>
</header>

<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center px-container-margin py-8 pb-44 overflow-y-auto">

  <!-- Palco -->
  <div class="w-full max-w-md flex flex-col items-center mb-10">
    <div class="w-full h-2 bg-outline-variant stage-curve mb-2"></div>
    <p class="font-label-md text-label-md text-on-surface-variant tracking-widest uppercase">Palco</p>
  </div>

  <!-- Plateia Premium -->
  <div class="w-full max-w-sm mb-10">
    <div class="flex items-center justify-center gap-2 mb-1">
      <h3 class="font-label-lg text-label-lg text-on-surface-variant text-center">Plateia Premium</h3>
    </div>
    <p class="font-label-sm text-label-sm text-on-surface-variant text-center mb-6 tracking-wider">R$ 220,00 por assento</p>
    <div class="flex flex-col items-center gap-2" id="plateia-grid"></div>
  </div>

  <!-- Balcão Superior -->
  <div class="w-full max-w-sm mb-8">
    <div class="flex items-center justify-center gap-2 mb-1">
      <h3 class="font-label-lg text-label-lg text-on-surface-variant text-center">Balcão Superior</h3>
    </div>
    <p class="font-label-sm text-label-sm text-on-surface-variant text-center mb-6 tracking-wider">R$ 140,00 por assento</p>
    <div class="flex flex-col items-center gap-2" id="balcao-grid"></div>
  </div>

  <!-- Legenda -->
  <div class="mt-4 w-full max-w-md bg-surface-container-low border border-outline-variant p-4 rounded-xl flex flex-wrap justify-around items-center gap-3">
    <div class="flex items-center gap-2">
      <div class="w-4 h-3 rounded-sm" style="background:#241800"></div>
      <span class="font-label-sm text-label-sm text-on-surface-variant">Plateia livre</span>
    </div>
    <div class="flex items-center gap-2">
      <div class="w-4 h-3 rounded-sm bg-surface-variant border border-outline-variant"></div>
      <span class="font-label-sm text-label-sm text-on-surface-variant">Balcão livre</span>
    </div>
    <div class="flex items-center gap-2">
      <div class="w-4 h-3 rounded-sm" style="background:#003057"></div>
      <span class="font-label-sm text-label-sm text-on-surface-variant">Selecionado</span>
    </div>
    <div class="flex items-center gap-2">
      <div class="w-4 h-3 rounded-sm bg-outline opacity-40"></div>
      <span class="font-label-sm text-label-sm text-on-surface-variant">Ocupado</span>
    </div>
  </div>

</main>

<!-- Summary Bar -->
<section class="fixed bottom-0 left-0 w-full z-50">
  <div class="h-4 w-full perforation"></div>
  <div class="bg-surface/95 backdrop-blur-md px-container-margin py-5 border-t border-outline-variant shadow-[0_-4px_12px_rgba(0,0,0,0.06)]">
    <div class="max-w-screen-xl mx-auto flex items-center justify-between gap-4">
      <div class="flex flex-col">
        <span id="seat-count" class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Nenhum assento</span>
        <div class="flex items-baseline gap-1 mt-0.5">
          <span id="total-price" class="font-headline-md text-headline-md text-primary">R$ 0,00</span>
          <span class="font-label-sm text-label-sm text-on-surface-variant">+ taxas</span>
        </div>
      </div>
      <button
        id="cta-btn"
        disabled
        onclick="continuar()"
        class="bg-primary-container text-on-primary px-6 h-14 rounded-lg flex items-center gap-2 transition-all duration-200 active:scale-95 shadow-sm hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100 whitespace-nowrap"
      >
        <span class="font-label-lg text-label-lg">Continuar</span>
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </div>
  </div>
</section>

<script>
  const PLATEIA_PRICE = 220;
  const BALCAO_PRICE  = 140;

  const OCCUPIED = new Set([
    'A1','A8','B4','B5','C3','C6','D1','D8',
    'E3','E4','E8','F6','F7','G1','G10'
  ]);

  const selected = new Map();

  function fmtBRL(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function buildGrid(containerId, rows, cols, type) {
    const container = document.getElementById(containerId);
    rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'seat-row';
      const lbl = document.createElement('div');
      lbl.className = 'row-label';
      lbl.textContent = row;
      rowEl.appendChild(lbl);
      for (let c = 1; c <= cols; c++) {
        if (type === 'plateia' && c === Math.floor(cols / 2) + 1) {
          const aisle = document.createElement('div');
          aisle.className = 'aisle';
          rowEl.appendChild(aisle);
        }
        const id  = row + c;
        const btn = document.createElement('button');
        btn.className = 'seat seat-' + type;
        btn.setAttribute('aria-label', 'Assento ' + id);
        btn.dataset.id   = id;
        btn.dataset.type = type;
        if (OCCUPIED.has(id)) {
          btn.classList.add('seat-occupied');
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => toggleSeat(btn, id, type));
        }
        rowEl.appendChild(btn);
      }
      container.appendChild(rowEl);
    });
  }

  function toggleSeat(btn, id, type) {
    if (selected.has(id)) {
      selected.delete(id);
      btn.classList.remove('seat-selected');
    } else {
      selected.set(id, type);
      btn.classList.add('seat-selected');
    }
    updateSummary();
  }

  function updateSummary() {
    const count   = selected.size;
    const countEl = document.getElementById('seat-count');
    const priceEl = document.getElementById('total-price');
    const ctaBtn  = document.getElementById('cta-btn');

    if (count === 0) {
      countEl.textContent = 'Nenhum assento';
      priceEl.textContent = 'R$ 0,00';
      ctaBtn.disabled = true;
      return;
    }

    let total = 0;
    selected.forEach((type) => {
      total += type === 'plateia' ? PLATEIA_PRICE : BALCAO_PRICE;
    });

    countEl.textContent = count === 1 ? '1 assento selecionado' : count + ' assentos selecionados';
    priceEl.textContent = fmtBRL(total);
    ctaBtn.disabled = false;
  }

  function continuar() {
    if (selected.size === 0) return;
    let total = 0;
    selected.forEach((type) => {
      total += type === 'plateia' ? PLATEIA_PRICE : BALCAO_PRICE;
    });
    localStorage.setItem('assentosSelecionados', JSON.stringify(Array.from(selected.keys())));
    localStorage.setItem('totalIngressos', total.toFixed(2));
    window.location.href = 'payment.html';
  }

  buildGrid('plateia-grid', ['A','B','C','D'], 8, 'plateia');
  buildGrid('balcao-grid',  ['E','F','G'],    10, 'balcao');
</script>
</body>
</html>
