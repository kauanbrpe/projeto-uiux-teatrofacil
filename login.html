<body class="bg-background text-on-background min-h-screen font-body-md text-body-md antialiased overflow-x-hidden">

<main class="relative flex flex-col min-h-screen w-full max-w-md mx-auto overflow-hidden">

</section>
<!-- Content Canvas -->
<section class="flex-grow flex flex-col px-container-margin -mt-8 relative z-10 bg-background rounded-t-[24px] pt-stack-lg pb-stack-lg shadow-[0_-8px_24px_rgba(0,0,0,0.05)]">
<header class="mb-stack-lg text-center">
<h2 class="font-headline-md text-headline-md text-primary mb-1">Bem-vindo à plateia</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Acesse sua conta para garantir os melhores lugares.</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md flex-grow" id="loginForm">
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">E-MAIL</label>
<div class="input-focus-effect flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-4 h-12 transition-all">
<span class="material-symbols-outlined text-outline mr-3">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder-on-surface-variant/50" id="email" name="email" placeholder="nome@exemplo.com" required="" type="email">
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">SENHA</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Esqueci a senha</a>
</div>
<div class="input-focus-effect flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-4 h-12 transition-all">
<span class="material-symbols-outlined text-outline mr-3">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="mt-4 bg-primary-container text-white font-label-lg text-label-lg h-14 rounded-lg shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
    <span>ENTRAR</span>
    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
    </button>
</form>
<!-- Social Login & Divider -->

<!-- Subtle Background Accent -->
<div class="fixed top-0 right-0 w-64 h-64 bg-secondary-container/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-0 left-0 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px] -z-10"></div>
<script>
    // Micro-interação nos inputs
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.classList.add('border-primary');
        });
        input.addEventListener('blur', () => {
            input.parentElement.classList.remove('border-primary');
        });
    });

    // Toggle visibilidade de senha
    document.querySelector('button[type="button"]').addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = this.querySelector('span');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerText = 'visibility_off';
        } else {
            input.type = 'password';
            icon.innerText = 'visibility';
        }
    });

    // Validação do login
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const emailDigitado = document.getElementById('email').value;
        const senhaDigitada = document.getElementById('password').value;

        const emailSalvo = localStorage.getItem('emailUsuario');
        const senhaSalva = localStorage.getItem('senhaUsuario');

        if (emailDigitado === emailSalvo && senhaDigitada === senhaSalva) {
            window.location.href = 'home.html';
        } else {
            alert('E-mail ou senha incorretos. Verifique seus dados ou cadastre-se.');
        }
    });
</script>
